name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          set -euo pipefail
          bash -n scripts/*.sh

      - name: Shellcheck
        run: |
          set -euo pipefail
          shellcheck scripts/*.sh
